name: Calculation Properties

on:
  pull_request:
    paths:
      - "lib/cbam/**"
      - "functions/src/cbam/**"
      - "scripts/verify-calculation-properties.mjs"
      - "package.json"
      - "package-lock.json"
  push:
    branches: [main]
    paths:
      - "lib/cbam/**"
      - "functions/src/cbam/**"
      - "scripts/verify-calculation-properties.mjs"
      - "package.json"
      - "package-lock.json"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: calculation-properties-${{ github.ref }}
  cancel-in-progress: true

jobs:
  property-tests:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install locked project dependencies
        run: npm ci --no-audit --no-fund --loglevel=error

      - name: Install pinned property-test runner without changing the lockfile
        run: npm install --no-save --package-lock=false --ignore-scripts --no-audit --no-fund --loglevel=error fast-check@4.9.0 tsx@4.20.6

      - name: Verify mathematical invariants
        shell: bash
        run: |
          set +e
          npx --no-install tsx scripts/verify-calculation-properties.mjs > property-test.log 2>&1
          status=$?
          cat property-test.log
          exit "$status"

      - name: Upload property-test diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: calculation-properties-${{ github.sha }}
          path: property-test.log
          if-no-files-found: error
          retention-days: 14
