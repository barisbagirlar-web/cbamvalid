name: Calculation Properties

on:
  pull_request:
    paths:
      - "lib/cbam/**"
      - "functions/src/cbam/**"
      - "scripts/verify-calculation-properties.mjs"
      - "package.json"
      - "package-lock.json"
  push:
    branches: [main]
    paths:
      - "lib/cbam/**"
      - "functions/src/cbam/**"
      - "scripts/verify-calculation-properties.mjs"
      - "package.json"
      - "package-lock.json"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: calculation-properties-${{ github.ref }}
  cancel-in-progress: true

jobs:
  property-tests:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm

      - name: Install locked project dependencies
        shell: bash
        run: |
          set -o pipefail
          npm ci --no-audit --no-fund --loglevel=error 2>&1 | tee dependency-install.log

      - name: Install pinned property-test runner without changing the lockfile
        shell: bash
        run: |
          set -o pipefail
          npm install --no-save --package-lock=false --ignore-scripts --no-audit --no-fund --loglevel=error fast-check@4.9.0 tsx@4.20.6 2>&1 | tee property-runner-install.log

      - name: Verify mathematical invariants
        shell: bash
        run: |
          set -o pipefail
          npx --no-install tsx scripts/verify-calculation-properties.mjs 2>&1 | tee property-test.log

      - name: Upload property-test diagnostics
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: calculation-properties-${{ github.sha }}-${{ github.run_attempt }}
          path: "*.log"
          if-no-files-found: error
          retention-days: 14
