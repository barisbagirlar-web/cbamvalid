name: Staging DAST

on:
  workflow_dispatch:
    inputs:
      target_url:
        description: "HTTPS staging URL. Production cbamvalid.com is intentionally blocked."
        required: true
        type: string
  schedule:
    - cron: "41 4 * * 3"

permissions:
  contents: read
  issues: write

concurrency:
  group: dast-${{ github.workflow }}
  cancel-in-progress: false

jobs:
  zap-baseline:
    name: ZAP passive baseline
    if: ${{ github.event_name == 'workflow_dispatch' || vars.CBAMVALID_STAGING_URL != '' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    env:
      TARGET_URL: ${{ github.event_name == 'workflow_dispatch' && inputs.target_url || vars.CBAMVALID_STAGING_URL }}
    steps:
      - name: Validate target safety
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${TARGET_URL}" ]]; then
            echo "CBAMVALID_STAGING_URL is not configured."
            exit 1
          fi
          if [[ "${TARGET_URL}" != https://* ]]; then
            echo "Only HTTPS staging targets are allowed."
            exit 1
          fi
          case "${TARGET_URL}" in
            https://cbamvalid.com*|https://www.cbamvalid.com*)
              echo "Production scanning is blocked by policy."
              exit 1
              ;;
          esac

      - name: Checkout
        uses: actions/checkout@v5

      - name: Run ZAP baseline against staging
        uses: zaproxy/action-baseline@v0.15.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          target: ${{ env.TARGET_URL }}
          docker_name: ghcr.io/zaproxy/zaproxy:stable
          allow_issue_writing: true
          issue_title: "CBAMValid staging ZAP baseline findings"
          fail_action: true
          artifact_name: zap-staging-${{ github.sha }}
          cmd_options: "-a -m 5"
