name: Functions Lockfile Sync

on:
  pull_request:
    branches:
      - feat/exporter-verification-platform-v1
    paths:
      - "functions/package.json"
      - ".github/workflows/functions-lock-sync.yml"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: read

concurrency:
  group: functions-lock-sync-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  sync:
    name: Generate and validate Functions lockfile
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Checkout pull-request head
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.head.ref || github.ref_name }}
          persist-credentials: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: functions/package-lock.json

      - name: Regenerate locked Functions dependencies
        working-directory: functions
        run: npm install --package-lock-only --ignore-scripts --no-audit --no-fund

      - name: Install and compile Functions
        working-directory: functions
        run: |
          npm ci --ignore-scripts --no-audit --no-fund
          npm run build

      - name: Commit lockfile when changed
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet -- functions/package-lock.json; then
            echo "FUNCTIONS_LOCKFILE_ALREADY_CURRENT=YES"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add functions/package-lock.json
          git commit -m "build(functions): synchronize dependency lockfile"
          git push origin "HEAD:${{ github.event.pull_request.head.ref }}"
