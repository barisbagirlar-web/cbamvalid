env:
  - variable: NEXT_PUBLIC_FIREBASE_API_KEY
    value: "AIzaSyD719QlNheW-iiRLbCU9TGk0yymm3QS90Q"
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    value: "cbam-desk.firebaseapp.com"
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    value: "cbam-desk"
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_APP_ID
    value: "1:89463138012:web:88738908b8f9eb5659f619"
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
    value: "cbam-desk.firebasestorage.app"
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
    value: "89463138012"
    availability:
      - BUILD
      - RUNTIME

  # Firebase Admin SDK — mounted from Secret Manager at runtime.
  - variable: FIREBASE_ADMIN_SERVICE_ACCOUNT_B64
    secret: FIREBASE_ADMIN_SERVICE_ACCOUNT_B64
    availability:
      - RUNTIME

  # Public Paddle mode configuration. The browser token is intentionally
  # separated from the private server API key.
  - variable: NEXT_PUBLIC_PADDLE_ENV
    value: "sandbox"
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_PADDLE_SANDBOX
    value: "true"
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_PADDLE_PRICE_ID
    value: "pri_01kx4373n0xa7fthk3ttqqd7p8"
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_PADDLE_CLIENT_TOKEN
    secret: PADDLE_CLIENT_TOKEN
    availability:
      - BUILD
      - RUNTIME

  # Private Paddle credentials. Never store their values in this repository.
  - variable: PADDLE_API_KEY
    secret: PADDLE_API_KEY
    availability:
      - RUNTIME

  - variable: PADDLE_WEBHOOK_SECRET
    secret: PADDLE_WEBHOOK_SECRET
    availability:
      - RUNTIME
