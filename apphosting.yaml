runConfig:
  minInstances: 1
  maxInstances: 10
  concurrency: 80
  cpu: 1
  memoryMiB: 512

env:
  - variable: NEXT_PUBLIC_FIREBASE_API_KEY
    value: "AIzaSyD719QlNheW-iiRLbCU9TGk0yymm3QS90Q"
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    value: "cbam-desk.firebaseapp.com"
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    value: "cbam-desk"
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_APP_ID
    value: "1:89463138012:web:88738908b8f9eb5659f619"
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
    value: "cbam-desk.firebasestorage.app"
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
    value: "89463138012"
    availability:
      - BUILD
      - RUNTIME

  # Firebase Admin SDK - mounted from Secret Manager at runtime
  # Never stored in plaintext; bound via IAM to App Hosting service account
  - variable: FIREBASE_ADMIN_SERVICE_ACCOUNT_B64
    secret: FIREBASE_ADMIN_SERVICE_ACCOUNT_B64
    availability:
      - RUNTIME

  # NOTE: Paddle env vars intentionally omitted from this first App Hosting
  # attempt. The current live deployment already runs with
  # PADDLE_API_KEY undefined ("[PADDLE] Warning: PADDLE_API_KEY environment
  # variable is not defined" appears in every `firebase deploy` log) - so
  # this is not a regression, it surfaces a pre-existing gap. Add Paddle
  # secrets via `firebase apphosting:secrets:set` once the base backend is
  # confirmed working, then add matching `secret:` entries here.
