<?xml version="1.0" encoding="UTF-8"?>
<svg
  xmlns="http://www.w3.org/2000/svg"
  width="980"
  height="240"
  viewBox="0 0 980 240"
  role="img"
  aria-labelledby="title desc"
>
  <title id="title">CBAMvalid Logo</title>
  <desc id="desc">Premium CBAMvalid logo with a clean orange validation seal and light wordmark for dark backgrounds.</desc>

  <defs>
    <linearGradient id="cbam-orange" x1="28" y1="24" x2="148" y2="154" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FF7A1A"/>
      <stop offset="55%" stop-color="#F45B1F"/>
      <stop offset="100%" stop-color="#D9461F"/>
    </linearGradient>
  </defs>

  <!-- transparent background -->

  <g transform="translate(44 36)" fill="none" stroke="url(#cbam-orange)" stroke-linecap="round" stroke-linejoin="round" shape-rendering="geometricPrecision">
    <!-- closed validation seal: one clean path, no broken internal geometry -->
    <path
      d="M84 8
         L152 47
         L152 125
         L84 164
         L16 125
         L16 47
         Z"
      stroke-width="13"
    />

    <!-- independent validation check: does not cut or collide with the seal -->
    <path
      d="M48 85
         L75 112
         L124 60"
      stroke-width="16"
    />
  </g>

  <g>
    <text
      x="250"
      y="116"
      fill="#111111"
      font-family="Georgia, 'Times New Roman', serif"
      font-size="70"
      font-weight="600"
      letter-spacing="-1.4"
    >CBAMvalid</text>

    <text
      x="254"
      y="158"
      fill="#3A342F"
      font-family="Arial, Helvetica, sans-serif"
      font-size="28"
      font-weight="400"
      letter-spacing="0"
    >Carbon Border Compliance Validation</text>
  </g>
</svg>
